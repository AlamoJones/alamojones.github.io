name: Protect people.txt

on:
  push:
    branches: [main]
    paths:
      - 'people.txt'

jobs:
  enforce-true:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check and fix people.txt
        run: |
          content=$(cat people.txt | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
          if [ "$content" != "true" ]; then
            echo "true" > people.txt
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add people.txt
            git commit -m "Auto-enforce: people.txt set to true"
            git push
          fi
